name: Atom Daily Refresh

on:
  schedule:
    # 6pm EST = 23:00 UTC
    - cron: "0 23 * * *"
  workflow_dispatch: # manual trigger from Actions UI

jobs:
  refresh:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Refresh merged PRs and translations
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: node scripts/refresh.mjs

      - name: Commit updated data
        run: |
          git config user.name "Atom Bot"
          git config user.email "atom-bot@atlashxm.com"
          git add data/atom-output/merged-prs.json data/atom-output/brief.json data/atom-output/last-refreshed.json
          if git diff --staged --quiet; then
            echo "No changes — skipping commit"
          else
            git commit -m "chore: atom daily refresh $(date -u '+%Y-%m-%d %H:%M UTC')"
            git push
          fi
