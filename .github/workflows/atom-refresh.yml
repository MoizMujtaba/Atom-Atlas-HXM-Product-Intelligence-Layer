name: Atom Daily Refresh

on:
  schedule:
    # 6pm EST = 23:00 UTC (11pm UTC)
    # Note: during EDT (summer), this runs at 7pm ET. Adjust to 22:00 for 6pm EDT year-round.
    - cron: "0 23 * * *"
  workflow_dispatch: # allow manual trigger from GitHub Actions UI

jobs:
  refresh:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run Atom refresh
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          LINEAR_API_KEY: ${{ secrets.LINEAR_API_KEY }}
          POSTHOG_API_KEY: ${{ secrets.POSTHOG_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: node scripts/refresh.mjs

      - name: Commit updated data
        run: |
          git config user.name "Atom Bot"
          git config user.email "atom-bot@atlashxm.com"
          git add data/atom-output/
          if git diff --staged --quiet; then
            echo "No data changes — skipping commit"
          else
            git commit -m "chore: atom daily refresh $(date -u '+%Y-%m-%d %H:%M UTC')"
            git push
          fi
